<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Memory Fabric</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF0EC;
    --surface: #FFFFFF;
    --surface-raised: #F5F6F1;
    --ink: #1E2420;
    --ink-dim: #5C6359;
    --ink-faint: #9AA098;
    --dormant-fill: #EDEFE8;
    --dormant-stroke: #B8BEAF;
    --brass: #B5761F;
    --brass-bright: #8F5A14;
    --brass-fill: #E8B972;
    --teal: #2F7A72;
    --brick: #A83F3B;
    --border: #DADED4;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; line-height: 1.6; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 32px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { color: var(--ink-dim); font-size: 15px; margin: 0 0 32px; }
  .console {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 32px;
    box-shadow: 0 1px 2px rgba(30,36,32,0.04);
  }
  .console input[type=text], .console select {
    background: var(--surface); border: 1px solid var(--border); color: var(--ink); border-radius: 6px;
    padding: 10px 12px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px;
  }
  .console input[type=text] { flex: 1; min-width: 260px; }
  .console button {
    background: var(--brass); color: #FFF8EC; border: none; border-radius: 6px; padding: 10px 20px;
    font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer; transition: background 0.15s;
  }
  .console button:hover { background: var(--brass-bright); }
  .console button:disabled { background: var(--ink-faint); cursor: not-allowed; }
  .label { font-size: 12px; color: var(--ink-dim); margin-right: 4px; }

  .top-row { display: flex; gap: 20px; align-items: stretch; margin-bottom: 20px; flex-wrap: wrap; }
  .brain-section { flex: 1.5; min-width: 380px; }
  .routing-panel { flex: 1; min-width: 260px; }

  h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 17px; margin: 0 0 14px; }
  #brain-svg { width: 100%; height: auto; display: block; }
  .lobe-circle { transition: fill 0.6s ease, stroke 0.4s ease, stroke-width 0.4s ease; }
  .lobe-circle.selected { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(181,118,31,0.35)); }
    50% { filter: drop-shadow(0 0 12px rgba(181,118,31,0.6)); }
  }
  .lobe-label { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; fill: var(--ink); }
  .brain-outline { fill: var(--surface); stroke: var(--dormant-stroke); stroke-width: 1.5; }
  .brain-fold { fill: none; stroke: var(--dormant-stroke); stroke-width: 1; opacity: 0.6; }

  .panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px;
    margin-bottom: 20px; box-shadow: 0 1px 2px rgba(30,36,32,0.04);
  }
  .routing-panel .panel { height: 100%; }

  .route-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .route-row:last-child { border-bottom: none; }
  .route-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .route-tag.selected { background: rgba(181,118,31,0.14); color: var(--brass-bright); }
  .route-tag.skipped { background: transparent; color: var(--ink-faint); }

  table.criteria { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.criteria th { text-align: left; font-weight: 500; color: var(--ink-dim); font-size: 12px; padding: 6px 10px 8px 0; border-bottom: 1px solid var(--border); }
  table.criteria td { padding: 10px 10px 10px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.criteria tr:last-child td { border-bottom: none; }
  table.criteria .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }
  table.criteria .reason { color: var(--ink-dim); }

  .evidence-item { margin-bottom: 14px; }
  .evidence-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .evidence-type { color: var(--ink-dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .evidence-importance { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--brass-bright); }
  .evidence-content { font-size: 14px; margin-bottom: 6px; }
  .bar-track { background: var(--dormant-fill); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--brass); border-radius: 4px; }
  .evidence-item.dropped .evidence-content { color: var(--ink-faint); text-decoration: line-through; }
  .evidence-item.dropped .bar-fill { background: var(--brick); }

  .answer-box { font-family: 'Fraunces', serif; font-size: 17px; line-height: 1.7; padding: 4px 0; }
  .coverage-row { display: flex; gap: 24px; margin-top: 16px; }
  .coverage-stat { font-size: 13px; color: var(--ink-dim); }
  .coverage-stat b { color: var(--ink); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

  .trace-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-faint); margin-top: 24px; }
  .empty-state { color: var(--ink-faint); font-size: 14px; padding: 24px 0; text-align: center; }
  .error-box { background: rgba(168,63,59,0.08); border: 1px solid var(--brick); color: #7A2F2C; border-radius: 8px; padding: 14px 18px; font-size: 14px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Agent memory fabric</h1>
  <p class="subtitle">Watch the agent think -- ask a question and see which memory regions activate.</p>

  <div class="console">
    <span class="label">Customer</span>
    <select id="customerSelect">
      <option value="acme_001">Acme Corporation</option>
      <option value="northstar_health_002">NorthStar Health Partners</option>
    </select>
    <input type="text" id="questionInput" placeholder="Why are they considering migration?" value="Why are they considering migration?">
    <button id="askButton" onclick="ask()">Ask</button>
  </div>

  <div class="top-row">
    <div class="brain-section">
      <h2>Memory activation</h2>
      <svg id="brain-svg" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="brainClip">
            <path d="M 205.7 175.3 Q 207.5 140.0 250.8 127.2 Q 270.0 92.1 320.0 91.4 Q 354.2 60.9 404.9 72.4 Q 450.0 50.0 495.1 72.4 Q 545.8 60.9 580.0 91.4 Q 630.0 92.1 649.2 127.2 Q 692.5 140.0 694.3 175.3 A 260.0 160.0 0 1 1 205.7 175.3 Z"/>
          </clipPath>
        </defs>
        <path class="brain-outline" d="M 205.7 175.3 Q 207.5 140.0 250.8 127.2 Q 270.0 92.1 320.0 91.4 Q 354.2 60.9 404.9 72.4 Q 450.0 50.0 495.1 72.4 Q 545.8 60.9 580.0 91.4 Q 630.0 92.1 649.2 127.2 Q 692.5 140.0 694.3 175.3 A 260.0 160.0 0 1 1 205.7 175.3 Z"/>
        <path class="brain-fold" d="M 450 78 Q 445 200 450 230 Q 455 300 450 350"/>

        <g clip-path="url(#brainClip)">
          <circle id="lobe-long_term" class="lobe-circle" cx="290" cy="175" r="46" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
          <circle id="lobe-episodic" class="lobe-circle" cx="610" cy="175" r="46" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
          <circle id="lobe-semantic" class="lobe-circle" cx="450" cy="230" r="55" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
          <circle id="lobe-procedural" class="lobe-circle" cx="290" cy="285" r="46" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
          <circle id="lobe-short_term" class="lobe-circle" cx="610" cy="285" r="46" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
        </g>

        <text x="290" y="175" text-anchor="middle" dominant-baseline="central" class="lobe-label">Long-term</text>
        <text x="610" y="175" text-anchor="middle" dominant-baseline="central" class="lobe-label">Episodic</text>
        <text x="450" y="230" text-anchor="middle" dominant-baseline="central" class="lobe-label">Semantic</text>
        <text x="290" y="285" text-anchor="middle" dominant-baseline="central" class="lobe-label">Procedural</text>
        <text x="610" y="285" text-anchor="middle" dominant-baseline="central" class="lobe-label">Short-term</text>
      </svg>
    </div>

    <div class="routing-panel">
      <div class="panel">
        <h2>Routing decision</h2>
        <div id="routingCompact"><div class="empty-state">Waiting for a question.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Decision criteria</h2>
    <div id="criteriaTable"><div class="empty-state">Ask a question to see classifier scores and routing reasons.</div></div>
  </div>

  <div id="results">
    <div class="empty-state">Ask a question to see the memory pipeline run.</div>
  </div>
</div>

<script>
const MEMORY_LABELS = {
  long_term: "Long-term",
  episodic: "Episodic",
  semantic: "Semantic",
  procedural: "Procedural",
  short_term: "Short-term"
};

function setLobeState(memoryType, score, selected) {
  const circle = document.getElementById(`lobe-${memoryType}`);
  const intensity = Math.min(score, 1);
  const r = 245 - intensity * 13;
  const g = 246 - intensity * 61;
  const b = 241 - intensity * 127;
  circle.setAttribute("fill", `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`);

  if (selected) {
    circle.classList.add("selected");
    circle.setAttribute("stroke", "#8F5A14");
    circle.setAttribute("stroke-width", "3");
  } else {
    circle.classList.remove("selected");
    circle.setAttribute("stroke", "#B8BEAF");
    circle.setAttribute("stroke-width", "2");
  }
}

function resetBrain() {
  Object.keys(MEMORY_LABELS).forEach(t => setLobeState(t, 0, false));
}

async function ask() {
  const question = document.getElementById("questionInput").value.trim();
  const customerId = document.getElementById("customerSelect").value;
  const button = document.getElementById("askButton");
  const results = document.getElementById("results");

  if (!question) return;

  button.disabled = true;
  button.textContent = "Thinking...";
  resetBrain();
  document.getElementById("routingCompact").innerHTML = '<div class="empty-state">Running...</div>';
  document.getElementById("criteriaTable").innerHTML = '<div class="empty-state">Running...</div>';
  results.innerHTML = '<div class="empty-state">Running classify &rarr; route &rarr; retrieve &rarr; fuse &rarr; reason...</div>';

  try {
    const resp = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, customer_id: customerId, session_id: "session_123" })
    });
    const data = await resp.json();

    if (!resp.ok) {
      results.innerHTML = `<div class="error-box">${data.detail || "Something went wrong."}</div>`;
      document.getElementById("routingCompact").innerHTML = "";
      document.getElementById("criteriaTable").innerHTML = "";
      return;
    }

    renderResults(data);
  } catch (err) {
    results.innerHTML = `<div class="error-box">Could not reach the server: ${err.message}</div>`;
  } finally {
    button.disabled = false;
    button.textContent = "Ask";
  }
}

function renderResults(data) {
  const selectedTypes = new Set(data.llm_decision.filter(d => d.selected).map(d => d.memory));
  Object.entries(data.classifier_candidates).forEach(([type, score]) => {
    setLobeState(type, score, selectedTypes.has(type));
  });

  const routingCompactHtml = data.llm_decision.map(d => `
    <div class="route-row">
      <span>${MEMORY_LABELS[d.memory] || d.memory}</span>
      <span class="route-tag ${d.selected ? 'selected' : 'skipped'}">${d.selected ? 'selected' : 'skipped'}</span>
    </div>
  `).join("");
  document.getElementById("routingCompact").innerHTML = routingCompactHtml;

  const criteriaRows = data.llm_decision.map(d => {
    const score = data.classifier_candidates[d.memory];
    return `
      <tr>
        <td>${MEMORY_LABELS[d.memory] || d.memory}</td>
        <td class="mono">${score.toFixed(3)}</td>
        <td><span class="route-tag ${d.selected ? 'selected' : 'skipped'}">${d.selected ? 'selected' : 'skipped'}</span></td>
        <td class="reason">${d.reason}</td>
      </tr>
    `;
  }).join("");
  document.getElementById("criteriaTable").innerHTML = `
    <table class="criteria">
      <thead><tr><th>Memory</th><th>Score</th><th>Status</th><th>Reason</th></tr></thead>
      <tbody>${criteriaRows}</tbody>
    </table>
  `;

  const allEvidence = [...data.evidence.map(e => ({...e, dropped: false})),
                       ...data.dropped_evidence.map(e => ({...e, dropped: true}))];
  allEvidence.sort((a, b) => b.importance - a.importance);

  const evidenceHtml = allEvidence.map(e => `
    <div class="evidence-item ${e.dropped ? 'dropped' : ''}">
      <div class="evidence-top">
        <span class="evidence-type">${e.memory_type}${e.dropped ? ' -- dropped (below relevance threshold)' : ''}</span>
        <span class="evidence-importance">${e.importance.toFixed(3)}</span>
      </div>
      <div class="evidence-content">${e.content}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.importance * 100)}%"></div></div>
    </div>
  `).join("");

  const coverage = data.coverage;
  const coverageItemsHtml = coverage.per_item.map(i => `
    <span class="coverage-stat">${i.evidence_id}: <b>${i.referenced ? 'used' : 'ignored'}</b></span>
  `).join(" &nbsp;&nbsp; ");

  document.getElementById("results").innerHTML = `
    <div class="panel">
      <h2>Fused evidence</h2>
      ${evidenceHtml || '<div class="empty-state">No evidence retrieved.</div>'}
    </div>
    <div class="panel">
      <h2>Answer</h2>
      <div class="answer-box">${data.answer}</div>
      <div class="coverage-row">
        <span class="coverage-stat">Coverage: <b>${Math.round(coverage.simple_coverage * 100)}%</b> of items, <b>${Math.round(coverage.importance_weighted_coverage * 100)}%</b> of importance</span>
      </div>
      <div style="margin-top:8px">${coverageItemsHtml}</div>
    </div>
    <div class="trace-id">Routing trace: ${data.trace_id}</div>
  `;
}

resetBrain();
</script>
</body>
</html>
