<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Memory Fabric</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF0EC;
    --surface: #FFFFFF;
    --surface-raised: #F5F6F1;
    --ink: #1E2420;
    --ink-dim: #5C6359;
    --ink-faint: #9AA098;
    --dormant-fill: #EDEFE8;
    --dormant-stroke: #B8BEAF;
    --brass: #B5761F;
    --brass-bright: #8F5A14;
    --brass-fill: #E8B972;
    --teal: #2F7A72;
    --brick: #A83F3B;
    --border: #DADED4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 24px 80px; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 32px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .subtitle {
    color: var(--ink-dim);
    font-size: 15px;
    margin: 0 0 32px;
  }
  .console {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
    box-shadow: 0 1px 2px rgba(30,36,32,0.04);
  }
  .console input[type=text], .console select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
  }
  .console input[type=text] { flex: 1; min-width: 260px; }
  .console button {
    background: var(--brass);
    color: #FFF8EC;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .console button:hover { background: var(--brass-bright); }
  .console button:disabled { background: var(--ink-faint); cursor: not-allowed; }
  .label { font-size: 12px; color: var(--ink-dim); margin-right: 4px; }

  .brain-section { position: relative; margin-bottom: 48px; }
  .brain-section h2, .panel h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 16px;
    color: var(--ink);
  }
  #brain-svg { width: 100%; height: auto; display: block; }
  .lobe-circle { transition: fill 0.6s ease, stroke 0.4s ease, stroke-width 0.4s ease; }
  .lobe-circle.selected { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(181,118,31,0.35)); }
    50% { filter: drop-shadow(0 0 12px rgba(181,118,31,0.6)); }
  }
  .lobe-label { font-family: 'IBM Plex Mono', monospace; font-size: 13px; fill: var(--ink); }
  .lobe-score { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: var(--ink-dim); }
  .brain-outline { fill: var(--surface); stroke: var(--dormant-stroke); stroke-width: 1.5; }
  .brain-fold { fill: none; stroke: var(--dormant-stroke); stroke-width: 1; opacity: 0.6; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 2px rgba(30,36,32,0.04);
  }
  .route-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .route-row:last-child { border-bottom: none; }
  .route-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .route-tag.selected { background: rgba(181,118,31,0.14); color: var(--brass-bright); }
  .route-tag.skipped { background: transparent; color: var(--ink-faint); }

  .evidence-item { margin-bottom: 14px; }
  .evidence-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .evidence-type { color: var(--ink-dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .evidence-importance { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--brass-bright); }
  .evidence-content { font-size: 14px; margin-bottom: 6px; color: var(--ink); }
  .bar-track { background: var(--dormant-fill); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--brass); border-radius: 4px; }
  .evidence-item.dropped .evidence-content { color: var(--ink-faint); text-decoration: line-through; }
  .evidence-item.dropped .bar-fill { background: var(--brick); }

  .answer-box {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
    padding: 4px 0;
  }
  .coverage-row { display: flex; gap: 24px; margin-top: 16px; }
  .coverage-stat { font-size: 13px; color: var(--ink-dim); }
  .coverage-stat b { color: var(--ink); font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

  .trace-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-faint); margin-top: 24px; }
  .empty-state { color: var(--ink-faint); font-size: 14px; padding: 24px 0; text-align: center; }
  .error-box { background: rgba(168,63,59,0.08); border: 1px solid var(--brick); color: #7A2F2C; border-radius: 8px; padding: 14px 18px; font-size: 14px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Agent memory fabric</h1>
  <p class="subtitle">Watch the agent think -- ask a question and see which memory regions activate.</p>

  <div class="console">
    <span class="label">Customer</span>
    <select id="customerSelect">
      <option value="acme_001">Acme Corporation</option>
      <option value="northstar_health_002">NorthStar Health Partners</option>
    </select>
    <input type="text" id="questionInput" placeholder="Why are they considering migration?" value="Why are they considering migration?">
    <button id="askButton" onclick="ask()">Ask</button>
  </div>

  <div class="brain-section">
    <h2>Memory activation</h2>
    <svg id="brain-svg" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="brainClip">
          <path d="M 450 80
                   C 360 80, 280 105, 230 150
                   C 175 130, 130 175, 135 230
                   C 138 280, 150 330, 190 365
                   C 175 400, 210 430, 260 435
                   C 320 445, 380 435, 430 440
                   C 450 445, 450 445, 470 440
                   C 520 435, 580 445, 640 435
                   C 690 430, 725 400, 710 365
                   C 750 330, 762 280, 765 230
                   C 770 175, 725 130, 670 150
                   C 620 105, 540 80, 450 80 Z"/>
        </clipPath>
      </defs>

      <path class="brain-outline"
            d="M 450 80
               C 360 80, 280 105, 230 150
               C 175 130, 130 175, 135 230
               C 138 280, 150 330, 190 365
               C 175 400, 210 430, 260 435
               C 320 445, 380 435, 430 440
               C 450 445, 450 445, 470 440
               C 520 435, 580 445, 640 435
               C 690 430, 725 400, 710 365
               C 750 330, 762 280, 765 230
               C 770 175, 725 130, 670 150
               C 620 105, 540 80, 450 80 Z"/>

      <path class="brain-fold" d="M 450 95 Q 445 220 450 265 Q 455 330 450 420"/>
      <path class="brain-fold" d="M 230 150 Q 255 165 255 190"/>
      <path class="brain-fold" d="M 670 150 Q 645 165 645 190"/>
      <path class="brain-fold" d="M 420 82 Q 450 92 480 82"/>

      <g clip-path="url(#brainClip)">
        <circle id="lobe-long_term" class="lobe-circle" cx="280" cy="190" r="62" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
        <circle id="lobe-episodic" class="lobe-circle" cx="620" cy="190" r="62" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
        <circle id="lobe-semantic" class="lobe-circle" cx="450" cy="265" r="75" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
        <circle id="lobe-procedural" class="lobe-circle" cx="300" cy="360" r="52" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
        <circle id="lobe-short_term" class="lobe-circle" cx="600" cy="360" r="52" fill="var(--dormant-fill)" stroke="var(--dormant-stroke)" stroke-width="2"/>
      </g>

      <text x="280" y="190" text-anchor="middle" dominant-baseline="central" class="lobe-label">identity</text>
      <text x="280" y="272" text-anchor="middle" class="lobe-score" id="score-long_term">--</text>

      <text x="620" y="190" text-anchor="middle" dominant-baseline="central" class="lobe-label">timeline</text>
      <text x="620" y="272" text-anchor="middle" class="lobe-score" id="score-episodic">--</text>

      <text x="450" y="265" text-anchor="middle" dominant-baseline="central" class="lobe-label">concepts</text>
      <text x="450" y="362" text-anchor="middle" class="lobe-score" id="score-semantic">--</text>

      <text x="300" y="360" text-anchor="middle" dominant-baseline="central" class="lobe-label">playbook</text>
      <text x="300" y="428" text-anchor="middle" class="lobe-score" id="score-procedural">--</text>

      <text x="600" y="360" text-anchor="middle" dominant-baseline="central" class="lobe-label">working</text>
      <text x="600" y="428" text-anchor="middle" class="lobe-score" id="score-short_term">--</text>
    </svg>
  </div>

  <div id="results">
    <div class="empty-state">Ask a question to see the memory pipeline run.</div>
  </div>
</div>

<script>
const MEMORY_LABELS = {
  long_term: "Long-term (identity)",
  episodic: "Episodic (timeline)",
  semantic: "Semantic (concepts)",
  procedural: "Procedural (playbook)",
  short_term: "Short-term (working)"
};

function setLobeState(memoryType, score, selected) {
  const circle = document.getElementById(`lobe-${memoryType}`);
  const scoreLabel = document.getElementById(`score-${memoryType}`);
  scoreLabel.textContent = score.toFixed(3);

  const intensity = Math.min(score, 1);
  // dormant fill (245,246,241) -> active brass fill (232,185,114)
  const r = 245 - intensity * 13;
  const g = 246 - intensity * 61;
  const b = 241 - intensity * 127;
  circle.setAttribute("fill", `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`);

  if (selected) {
    circle.classList.add("selected");
    circle.setAttribute("stroke", "#8F5A14");
    circle.setAttribute("stroke-width", "3");
  } else {
    circle.classList.remove("selected");
    circle.setAttribute("stroke", "#B8BEAF");
    circle.setAttribute("stroke-width", "2");
  }
}

function resetBrain() {
  Object.keys(MEMORY_LABELS).forEach(t => setLobeState(t, 0, false));
}

async function ask() {
  const question = document.getElementById("questionInput").value.trim();
  const customerId = document.getElementById("customerSelect").value;
  const button = document.getElementById("askButton");
  const results = document.getElementById("results");

  if (!question) return;

  button.disabled = true;
  button.textContent = "Thinking...";
  resetBrain();
  results.innerHTML = '<div class="empty-state">Running classify &rarr; route &rarr; retrieve &rarr; fuse &rarr; reason...</div>';

  try {
    const resp = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, customer_id: customerId, session_id: "session_123" })
    });
    const data = await resp.json();

    if (!resp.ok) {
      results.innerHTML = `<div class="error-box">${data.detail || "Something went wrong."}</div>`;
      return;
    }

    renderResults(data);
  } catch (err) {
    results.innerHTML = `<div class="error-box">Could not reach the server: ${err.message}</div>`;
  } finally {
    button.disabled = false;
    button.textContent = "Ask";
  }
}

function renderResults(data) {
  const selectedTypes = new Set(data.llm_decision.filter(d => d.selected).map(d => d.memory));
  Object.entries(data.classifier_candidates).forEach(([type, score]) => {
    setLobeState(type, score, selectedTypes.has(type));
  });

  const routingHtml = data.llm_decision.map(d => `
    <div class="route-row">
      <span>${MEMORY_LABELS[d.memory] || d.memory} &mdash; ${d.reason}</span>
      <span class="route-tag ${d.selected ? 'selected' : 'skipped'}">${d.selected ? 'selected' : 'skipped'}</span>
    </div>
  `).join("");

  const allEvidence = [...data.evidence.map(e => ({...e, dropped: false})),
                       ...data.dropped_evidence.map(e => ({...e, dropped: true}))];
  allEvidence.sort((a, b) => b.importance - a.importance);

  const evidenceHtml = allEvidence.map(e => `
    <div class="evidence-item ${e.dropped ? 'dropped' : ''}">
      <div class="evidence-top">
        <span class="evidence-type">${e.memory_type}${e.dropped ? ' -- dropped (below relevance threshold)' : ''}</span>
        <span class="evidence-importance">${e.importance.toFixed(3)}</span>
      </div>
      <div class="evidence-content">${e.content}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.importance * 100)}%"></div></div>
    </div>
  `).join("");

  const coverage = data.coverage;
  const coverageItemsHtml = coverage.per_item.map(i => `
    <span class="coverage-stat">${i.evidence_id}: <b>${i.referenced ? 'used' : 'ignored'}</b></span>
  `).join(" &nbsp;&nbsp; ");

  document.getElementById("results").innerHTML = `
    <div class="panel">
      <h2>Routing decision</h2>
      ${routingHtml}
    </div>
    <div class="panel">
      <h2>Fused evidence</h2>
      ${evidenceHtml || '<div class="empty-state">No evidence retrieved.</div>'}
    </div>
    <div class="panel">
      <h2>Answer</h2>
      <div class="answer-box">${data.answer}</div>
      <div class="coverage-row">
        <span class="coverage-stat">Coverage: <b>${Math.round(coverage.simple_coverage * 100)}%</b> of items, <b>${Math.round(coverage.importance_weighted_coverage * 100)}%</b> of importance</span>
      </div>
      <div style="margin-top:8px">${coverageItemsHtml}</div>
    </div>
    <div class="trace-id">Routing trace: ${data.trace_id}</div>
  `;
}

resetBrain();
</script>
</body>
</html>
